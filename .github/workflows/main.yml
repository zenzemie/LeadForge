name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install & Build Backend
      run: |
        cd server
        npm install
        
    - name: Install & Build Frontend
      run: |
        cd client
        npm install
        npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        continue-on-error: true
        run: |
          if [ "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" != "" ]; then
            curl -f -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          else
            echo "Deploy hook not configured."
          fi
